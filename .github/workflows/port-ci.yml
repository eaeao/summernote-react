name: port-ci

# CI for @eaeao/summernote-react (single package).
# Multi-engine gate: the suite must pass on BOTH Chromium and WebKit.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: yarn install --frozen-lockfile --ignore-scripts
      - name: jQuery-ban gate
        run: node scripts/check-no-jquery.mjs
      - name: Zero-dep gate
        run: node scripts/check-no-runtime-deps.mjs
      - name: Version sync gate
        run: node scripts/check-version.mjs
      - name: Typecheck
        run: yarn typecheck
      - name: Build
        run: yarn build
      - name: Package gate (publint + attw)
        run: yarn check:package
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium webkit
      - name: Test (chromium + webkit)
        run: yarn vitest run
